apiVersion: flightctl.io/v1alpha1
kind: Fleet
metadata:
 name: fleet-kiosk
spec:
 selector:
  matchLabels:
   fleet: kiosk
 template:
  spec:
    os:
      image: quay.io/kubealex/image-mode-kiosk:latest
    systemd:
      matchPatterns:
        - "flightctl-agent.service"
        - "microshift.service"
    config:
      - name: demo-configurations
        gitRef:
          repository: demo-configurations
          targetRevision: main
          path: /demo-configuration
